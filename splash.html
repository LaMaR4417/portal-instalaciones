<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Instalaciones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-app-region: drag;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 30px;
            width: 100%;
        }
        .logo {
            font-size: 56px;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }
        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }
        .separator {
            height: 2px;
            background: rgba(255,255,255,0.3);
            margin: 0 40px 25px;
            border-radius: 1px;
        }
        .progress-track {
            height: 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
            margin: 0 40px 12px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .status {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            min-height: 18px;
        }
        .version {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">IN</div>
        <div class="title">Portales de Instalaciones</div>
        <div class="subtitle">Navarro</div>
        <div class="separator"></div>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="status" id="statusText">Iniciando...</div>
    </div>
    <div class="version" id="versionText"></div>

    <script>
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');

        if (window.electronAPI) {
            window.electronAPI.onStatus((msg) => {
                statusText.textContent = msg;
            });
            window.electronAPI.onProgress((pct) => {
                progressBar.style.width = Math.max(0, Math.min(100, pct)) + '%';
            });
        }
    </script>
</body>
</html>
